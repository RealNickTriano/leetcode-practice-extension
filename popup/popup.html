<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
<title>Leetcode Anki</title>
</head>
<body data-tab="deck">

<header>
  <span class="brand"><img src="../icons/icon32.png" alt="" width="16" height="16">Leetcode Anki</span>
  <span class="counts" id="counts"></span>
</header>

<nav class="tabs">
  <button class="tab" data-tab="deck">Deck</button>
  <button class="tab" data-tab="stats">Stats</button>
  <button class="tab" data-tab="settings">Settings</button>
</nav>

<div class="deckbar">
  <select id="deck-select" aria-label="Selected deck"></select>
  <button id="deck-new" title="New deck">+ new</button>
  <button id="deck-rename" title="Rename this deck">rename</button>
  <button id="deck-del" title="Delete this deck">delete</button>
</div>

<div class="newdeck hidden" id="namedeck-row">
  <input id="namedeck-name" placeholder="deck name…" maxlength="40">
  <button id="namedeck-confirm">create</button>
</div>

<main id="list" aria-label="Deck"></main>

<section class="stats" aria-label="Stats">
  <div class="stat-block">
    <div class="stat-title">Deck maturity</div>
    <div class="maturity-bar" id="maturity-bar"></div>
    <div class="maturity-legend" id="maturity-legend"></div>
  </div>
  <div class="stat-block">
    <div class="stat-title">Due over the next 7 days</div>
    <div class="forecast" id="forecast"></div>
  </div>
</section>

<section class="settings" aria-label="Settings">
  <label class="setting">
    <span>
      <span class="setting-name">New cards per day</span>
      <span class="setting-desc">How many problems from the new queue are introduced
        each day. Due reviews always come first; 0 pauses new cards entirely.</span>
    </span>
    <span class="stepper">
      <button type="button" id="new-per-day-dec" aria-label="Fewer new cards per day">−</button>
      <input type="number" id="set-new-per-day" class="num-input" min="0" max="10" step="1">
      <button type="button" id="new-per-day-inc" aria-label="More new cards per day">+</button>
    </span>
  </label>
  <label class="setting">
    <span>
      <span class="setting-name">Day rollover hour</span>
      <span class="setting-desc">The next day starts at this hour, not midnight —
        reviews just after midnight still count as the previous day.</span>
    </span>
    <span class="stepper">
      <button type="button" id="rollover-dec" aria-label="Earlier day rollover">−</button>
      <input type="number" id="set-rollover-hour" class="num-input" min="0" max="12" step="1">
      <button type="button" id="rollover-inc" aria-label="Later day rollover">+</button>
    </span>
  </label>
  <label class="setting">
    <span>
      <span class="setting-name">Reset code on review</span>
      <span class="setting-desc">When you open a due or new deck problem, reset the editor
        to the default template so your old solution stays hidden.</span>
    </span>
    <input type="checkbox" id="set-reset-code" class="switch">
  </label>
  <label class="setting">
    <span>
      <span class="setting-name">Show topic tags</span>
      <span class="setting-desc">Show the problem's topic tags on the review card.
        Turn off if knowing the topic spoils the recall.</span>
    </span>
    <input type="checkbox" id="set-show-tags" class="switch">
  </label>
  <div class="setting">
    <span>
      <span class="setting-name">Backup</span>
      <span class="setting-desc">Export decks, review history, and settings as JSON,
        or restore from a backup. Importing replaces everything on this machine.</span>
    </span>
    <span class="backup-actions">
      <button id="export-json">export</button>
      <button id="import-json">import</button>
    </span>
    <input type="file" id="import-file" accept=".json,application/json" hidden>
  </div>
</section>

<script src="../lib/sm2.js"></script>
<script src="../lib/select.js"></script>
<script src="../lib/stats.js"></script>
<script src="../lib/store.js"></script>
<script src="popup.js"></script>
</body>
</html>
