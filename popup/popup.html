<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
<title>Leetcode Anki</title>
</head>
<body data-tab="deck">

<header>
  <span class="brand"><img src="../icons/icon32.png" alt="" width="16" height="16">Leetcode Anki</span>
  <span class="counts" id="counts"></span>
</header>

<nav class="tabs">
  <button class="tab" data-tab="deck">Deck</button>
  <button class="tab" data-tab="settings">Settings</button>
</nav>

<div class="deckbar">
  <select id="deck-select" aria-label="Selected deck"></select>
  <button id="deck-new" title="New deck">+ new</button>
  <button id="deck-del" title="Delete this deck">delete</button>
</div>

<div class="newdeck hidden" id="newdeck-row">
  <input id="newdeck-name" placeholder="deck name…" maxlength="40">
  <button id="newdeck-create">create</button>
</div>

<main id="list" aria-label="Deck"></main>

<section class="settings" aria-label="Settings">
  <label class="setting">
    <span>
      <span class="setting-name">Reset code on review</span>
      <span class="setting-desc">When you open a due or new deck problem, reset the editor
        to the default template so your old solution stays hidden.</span>
    </span>
    <input type="checkbox" id="set-reset-code" class="switch">
  </label>
</section>

<script src="../lib/sm2.js"></script>
<script src="../lib/select.js"></script>
<script src="../lib/store.js"></script>
<script src="popup.js"></script>
</body>
</html>
